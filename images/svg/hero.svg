<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="hero_sky" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#5AB0E0"/><stop offset="70%" stop-color="#D8F0F8"/><stop offset="100%" stop-color="#F0F8FF"/></linearGradient>
    <linearGradient id="hero_glass" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D0EAF8" stop-opacity="0.85"/><stop offset="100%" stop-color="#A0CCEC" stop-opacity="0.7"/></linearGradient>
    <linearGradient id="hero_frame" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2A7AAA"/><stop offset="100%" stop-color="#1A5A80"/></linearGradient>
    <linearGradient id="hero_floor" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#C8D8C0"/><stop offset="100%" stop-color="#A0B898"/></linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="1000" fill="url(#hero_sky)"/>
  <!-- Subtle clouds -->
  <ellipse cx="150" cy="100" rx="90" ry="35" fill="white" opacity="0.6"/>
  <ellipse cx="190" cy="88" rx="70" ry="28" fill="white" opacity="0.7"/>
  <ellipse cx="620" cy="140" rx="100" ry="38" fill="white" opacity="0.55"/>
  <ellipse cx="660" cy="126" rx="75" ry="30" fill="white" opacity="0.65"/>
  <!-- Ocean horizon line -->
  <rect y="700" width="800" height="300" fill="#2A80B8" opacity="0.15"/>
  <path d="M0 720 Q200 700 400 720 Q600 740 800 718" fill="none" stroke="#4A90C8" stroke-width="2" opacity="0.4"/>

  <!-- Miami skyline silhouette -->
  <rect x="580" y="560" width="40" height="200" fill="#2A5070" opacity="0.3"/>
  <rect x="628" y="520" width="55" height="240" fill="#2A5070" opacity="0.25"/>
  <rect x="690" y="580" width="35" height="180" fill="#2A5070" opacity="0.3"/>
  <rect x="730" y="540" width="70" height="220" fill="#2A5070" opacity="0.2"/>

  <!-- Palm tree left -->
  <rect x="60" y="580" width="12" height="280" fill="#3A6040" opacity="0.7"/>
  <path d="M66 580 Q20 530 0 555 Q40 548 66 580 Z" fill="#4A8050" opacity="0.8"/>
  <path d="M66 580 Q115 525 138 550 Q100 542 66 580 Z" fill="#4A8050" opacity="0.8"/>
  <path d="M66 580 Q55 520 66 490 Q72 545 66 580 Z" fill="#5A9060" opacity="0.8"/>
  <path d="M66 580 Q18 565 5 590 Q40 578 66 580 Z" fill="#3A7040" opacity="0.7"/>

  <!-- Palm tree right -->
  <rect x="720" y="600" width="12" height="260" fill="#3A6040" opacity="0.6"/>
  <path d="M726 600 Q680 548 660 572 Q698 562 726 600 Z" fill="#4A8050" opacity="0.7"/>
  <path d="M726 600 Q775 542 798 566 Q760 555 726 600 Z" fill="#4A8050" opacity="0.75"/>
  <path d="M726 600 Q715 540 725 510 Q731 562 726 600 Z" fill="#5A9060" opacity="0.75"/>

  <!-- Pool deck / patio floor -->
  <rect x="80" y="860" width="640" height="140" rx="4" fill="url(#hero_floor)" opacity="0.8"/>
  <!-- Pool -->
  <rect x="550" y="870" width="150" height="100" rx="8" fill="#2A90C8" opacity="0.7"/>
  <path d="M550 890 Q575 878 600 890 Q625 902 650 890 Q675 878 700 890" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- LARGE SLIDING DOOR - centered, impressive -->
  <rect x="120" y="200" width="560" height="680" rx="8" fill="url(#hero_frame)" stroke="#3A8AB0" stroke-width="4"/>

  <!-- Left fixed panel -->
  <rect x="128" y="208" width="264" height="664" rx="4" fill="url(#hero_glass)"/>
  <rect x="138" y="220" width="28" height="400" rx="8" fill="white" opacity="0.28"/>
  <rect x="175" y="220" width="12" height="320" rx="4" fill="white" opacity="0.13"/>
  <!-- Interior view through left panel -->
  <rect x="128" y="208" width="264" height="664" fill="rgba(220,240,255,0.08)"/>

  <!-- Vertical divider -->
  <rect x="392" y="200" width="18" height="680" rx="4" fill="url(#hero_frame)"/>

  <!-- Right sliding panel -->
  <rect x="410" y="208" width="262" height="664" rx="4" fill="url(#hero_glass)" opacity="0.92"/>
  <rect x="422" y="220" width="28" height="400" rx="8" fill="white" opacity="0.32"/>
  <rect x="460" y="220" width="12" height="320" rx="4" fill="white" opacity="0.15"/>

  <!-- Door handle -->
  <rect x="642" y="500" width="14" height="80" rx="7" fill="#4A9ABE"/>
  <rect x="638" y="520" width="22" height="40" rx="6" fill="#2A7A9A"/>
  <rect x="640" y="522" width="18" height="36" rx="5" fill="#4A9ABE"/>
  <!-- Handle shine -->
  <rect x="641" y="524" width="6" height="22" rx="3" fill="white" opacity="0.3"/>

  <!-- Bottom track -->
  <rect x="118" y="876" width="564" height="12" rx="5" fill="#1A5A80"/>
  <!-- Track groove -->
  <rect x="118" y="880" width="564" height="5" rx="2" fill="#0A3A58"/>

  <!-- 3 rollers on track -->
  <circle cx="240" cy="882" r="10" fill="#C8D8E8" stroke="#4A8AB0" stroke-width="2"/>
  <circle cx="240" cy="882" r="5" fill="#8AAAC0"/>
  <circle cx="400" cy="882" r="10" fill="#C8D8E8" stroke="#4A8AB0" stroke-width="2"/>
  <circle cx="400" cy="882" r="5" fill="#8AAAC0"/>
  <circle cx="560" cy="882" r="10" fill="#C8D8E8" stroke="#4A8AB0" stroke-width="2"/>
  <circle cx="560" cy="882" r="5" fill="#8AAAC0"/>

  <!-- Slide arrow indicator -->
  <path d="M580 350 L610 350 M600 335 L615 350 L600 365" fill="none" stroke="#4A9ABE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
</svg>