<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1A3A52"/><stop offset="100%" stop-color="#0D2030"/></linearGradient>
    <linearGradient id="glass1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#C5E4F5" stop-opacity="0.9"/><stop offset="100%" stop-color="#8FCDE8" stop-opacity="0.7"/></linearGradient>
    <linearGradient id="metal1" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4A7FA5"/><stop offset="100%" stop-color="#1B5A80"/></linearGradient>
    <linearGradient id="roller1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C8D8E8"/><stop offset="100%" stop-color="#8AA8C0"/></linearGradient>
    <filter id="glow1"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Background floor -->
  <rect width="800" height="500" fill="url(#bg1)"/>
  <!-- Floor reflection -->
  <rect y="380" width="800" height="120" fill="#0A1A26" opacity="0.6"/>
  <rect y="378" width="800" height="3" fill="#1B8FD6" opacity="0.3"/>

  <!-- Door frame left side -->
  <rect x="80" y="40" width="18" height="340" rx="3" fill="url(#metal1)"/>
  <rect x="80" y="40" width="18" height="340" rx="3" fill="url(#metal1)" opacity="0.3" transform="skewY(1)"/>

  <!-- Left glass panel -->
  <rect x="98" y="40" width="220" height="340" fill="url(#glass1)"/>
  <!-- Glass shine lines -->
  <rect x="110" y="50" width="12" height="220" rx="6" fill="white" opacity="0.25"/>
  <rect x="130" y="50" width="5" height="180" rx="2" fill="white" opacity="0.12"/>
  <!-- Reflection tint -->
  <rect x="98" y="40" width="220" height="340" fill="url(#glass1)" opacity="0.2"/>

  <!-- Center divider -->
  <rect x="318" y="40" width="16" height="340" rx="2" fill="url(#metal1)"/>

  <!-- Right glass panel (sliding) -->
  <rect x="334" y="40" width="220" height="340" fill="url(#glass1)" opacity="0.9"/>
  <rect x="346" y="50" width="12" height="220" rx="6" fill="white" opacity="0.3"/>
  <rect x="366" y="50" width="5" height="180" rx="2" fill="white" opacity="0.15"/>

  <!-- Handle on right panel -->
  <rect x="518" y="165" width="10" height="50" rx="5" fill="#B8D0E0"/>
  <rect x="514" y="178" width="18" height="24" rx="4" fill="#90B8D0"/>
  <rect x="516" y="180" width="14" height="20" rx="3" fill="#B8D0E0"/>
  <!-- Handle shine -->
  <rect x="517" y="181" width="4" height="8" rx="2" fill="white" opacity="0.4"/>

  <!-- Track at bottom -->
  <rect x="78" y="378" width="476" height="10" rx="3" fill="#1B4A6A"/>
  <!-- Track groove -->
  <rect x="78" y="381" width="476" height="4" rx="2" fill="#0D2D42"/>

  <!-- OLD WORN ROLLER (left, damaged) -->
  <g transform="translate(160, 375)">
    <circle r="18" fill="#5A6A70" stroke="#3A4A50" stroke-width="2"/>
    <circle r="10" fill="#3A4A50"/>
    <circle r="5" fill="#2A3540"/>
    <!-- Corrosion marks -->
    <path d="M-14 -10 Q-8 -5 -12 2" stroke="#8A5A30" stroke-width="2" fill="none"/>
    <path d="M8 -12 Q12 -6 10 0" stroke="#8A5A30" stroke-width="1.5" fill="none"/>
    <path d="M-5 12 Q0 8 5 13" stroke="#8A5A30" stroke-width="1.5" fill="none"/>
    <text y="32" text-anchor="middle" font-family="Arial" font-size="10" fill="#FF6B6B" font-weight="700">WORN</text>
  </g>

  <!-- NEW SHINY ROLLER (right, replaced) -->
  <g transform="translate(420, 375)">
    <circle r="20" fill="url(#roller1)" stroke="#90B8D0" stroke-width="2.5"/>
    <circle r="11" fill="#C8D8E0"/>
    <circle r="6" fill="#A0B8C8"/>
    <circle r="3" fill="#D8E8F0"/>
    <!-- Shine on new roller -->
    <ellipse cx="-6" cy="-6" rx="5" ry="4" fill="white" opacity="0.4" transform="rotate(-30 -6 -6)"/>
    <text y="34" text-anchor="middle" font-family="Arial" font-size="10" fill="#4ADE80" font-weight="700">NEW</text>
  </g>

  <!-- Arrow between rollers -->
  <path d="M 185 375 L 395 375" stroke="#1B8FD6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#1B8FD6"/></marker></defs>

  <!-- Label text -->
  <rect x="0" y="420" width="800" height="80" fill="rgba(0,0,0,0.7)"/>
  <text x="400" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="white">Roller Replacement — Marine-Grade 316L Stainless</text>
  <text x="400" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#90C8E8">Salt-air resistant · Lifetime warranty · South Florida specialists</text>
</svg>