<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1A3048"/><stop offset="100%" stop-color="#0A1828"/></linearGradient>
    <linearGradient id="sky5" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4AA8D8"/><stop offset="100%" stop-color="#D8F0F8"/></linearGradient>
    <linearGradient id="glass5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C8E8F8" stop-opacity="0.7"/><stop offset="100%" stop-color="#98C8E8" stop-opacity="0.5"/></linearGradient>
    <linearGradient id="frame5" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3A6A90"/><stop offset="100%" stop-color="#1A4A6A"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg5)"/>

  <!-- 4 window types shown -->
  <!-- SINGLE HUNG (top left) -->
  <g transform="translate(60,50)">
    <rect width="160" height="200" rx="5" fill="url(#frame5)" stroke="#4A8AB0" stroke-width="2"/>
    <rect x="8" y="8" width="144" height="88" rx="2" fill="url(#sky5)" opacity="0.8"/>
    <rect x="8" y="8" width="144" height="88" rx="2" fill="url(#glass5)"/>
    <rect x="10" y="10" width="20" height="70" rx="4" fill="white" opacity="0.25"/>
    <rect x="8" y="102" width="144" height="90" rx="2" fill="url(#glass5)"/>
    <rect x="10" y="104" width="20" height="70" rx="4" fill="white" opacity="0.25"/>
    <!-- Horizontal rail -->
    <rect x="8" y="97" width="144" height="8" rx="2" fill="url(#frame5)"/>
    <!-- Crank handle -->
    <rect x="76" y="92" width="8" height="14" rx="3" fill="#90B8D0"/>
    <text x="80" y="218" text-anchor="middle" font-family="Arial" font-size="11" fill="#90C8E8" font-weight="600">Single-Hung</text>
  </g>

  <!-- CASEMENT (top right) -->
  <g transform="translate(260,50)">
    <rect width="160" height="200" rx="5" fill="url(#frame5)" stroke="#4A8AB0" stroke-width="2"/>
    <rect x="8" y="8" width="144" height="184" rx="2" fill="url(#sky5)" opacity="0.7"/>
    <rect x="8" y="8" width="144" height="184" rx="2" fill="url(#glass5)"/>
    <rect x="10" y="12" width="18" height="140" rx="4" fill="white" opacity="0.28"/>
    <!-- Crank mechanism -->
    <circle cx="145" cy="120" r="8" fill="#5A9ABE"/>
    <rect x="130" y="118" width="22" height="5" rx="2" fill="#3A7A9A"/>
    <circle cx="145" cy="120" r="4" fill="#3A6A88"/>
    <text x="80" y="218" text-anchor="middle" font-family="Arial" font-size="11" fill="#90C8E8" font-weight="600">Casement</text>
  </g>

  <!-- JALOUSIE (bottom left) -->
  <g transform="translate(460,50)">
    <rect width="160" height="200" rx="5" fill="url(#frame5)" stroke="#4A8AB0" stroke-width="2"/>
    <!-- Jalousie slats -->
    <rect x="8" y="18" width="144" height="16" rx="1" fill="url(#glass5)" stroke="#3A6A88" stroke-width="1"/>
    <rect x="8" y="38" width="144" height="16" rx="1" fill="url(#glass5)" stroke="#3A6A88" stroke-width="1"/>
    <rect x="8" y="58" width="144" height="16" rx="1" fill="url(#glass5)" stroke="#3A6A88" stroke-width="1"/>
    <rect x="8" y="78" width="144" height="16" rx="1" fill="url(#glass5)" stroke="#3A6A88" stroke-width="1"/>
    <rect x="8" y="98" width="144" height="16" rx="1" fill="url(#glass5)" stroke="#3A6A88" stroke-width="1"/>
    <rect x="8" y="118" width="144" height="16" rx="1" fill="url(#glass5)" stroke="#3A6A88" stroke-width="1"/>
    <rect x="8" y="138" width="144" height="16" rx="1" fill="url(#glass5)" stroke="#3A6A88" stroke-width="1"/>
    <rect x="8" y="158" width="144" height="16" rx="1" fill="url(#glass5)" stroke="#3A6A88" stroke-width="1"/>
    <rect x="8" y="178" width="144" height="16" rx="1" fill="url(#glass5)" stroke="#3A6A88" stroke-width="1"/>
    <!-- Operator -->
    <rect x="148" y="90" width="6" height="40" rx="2" fill="#5A9ABE"/>
    <text x="80" y="218" text-anchor="middle" font-family="Arial" font-size="11" fill="#90C8E8" font-weight="600">Jalousie</text>
  </g>

  <!-- AWNING (bottom right) -->
  <g transform="translate(620,50)">
    <rect width="155" height="200" rx="5" fill="url(#frame5)" stroke="#4A8AB0" stroke-width="2"/>
    <rect x="8" y="8" width="139" height="100" rx="2" fill="url(#glass5)"/>
    <rect x="10" y="10" width="18" height="80" rx="4" fill="white" opacity="0.28"/>
    <rect x="8" y="104" width="139" height="88" rx="2" fill="url(#sky5)" opacity="0.5"/>
    <rect x="8" y="104" width="139" height="88" rx="2" fill="url(#glass5)" opacity="0.5"/>
    <!-- Awning open angle suggestion -->
    <line x1="8" y1="104" x2="50" y2="80" stroke="#4A8AB0" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="77" y="218" text-anchor="middle" font-family="Arial" font-size="11" fill="#90C8E8" font-weight="600">Awning</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="310" width="800" height="190" fill="rgba(8,16,28,0.8)"/>
  <text x="400" y="360" text-anchor="middle" font-family="Arial" font-size="22" font-weight="800" fill="white">All Florida Window Types Repaired</text>
  <text x="400" y="388" text-anchor="middle" font-family="Arial" font-size="14" fill="#90C8E8">Single-hung · Casement · Jalousie · Awning · Double-hung · Impact</text>

  <!-- Features row -->
  <text x="133" y="430" text-anchor="middle" font-family="Arial" font-size="13" fill="#4ADE80">✓ Glass Replacement</text>
  <text x="300" y="430" text-anchor="middle" font-family="Arial" font-size="13" fill="#4ADE80">✓ Crank Repair</text>
  <text x="460" y="430" text-anchor="middle" font-family="Arial" font-size="13" fill="#4ADE80">✓ Screen Replacement</text>
  <text x="633" y="430" text-anchor="middle" font-family="Arial" font-size="13" fill="#4ADE80">✓ Balance Repair</text>
  <text x="400" y="468" text-anchor="middle" font-family="Arial" font-size="13" fill="#90C8E8">First-visit fix rate 94% · All Broward, Miami-Dade &amp; Palm Beach</text>
</svg>