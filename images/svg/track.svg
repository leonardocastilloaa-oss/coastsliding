<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1A2A3A"/><stop offset="100%" stop-color="#0A1820"/></linearGradient>
    <linearGradient id="track2" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3A5A70"/><stop offset="100%" stop-color="#1A3A50"/></linearGradient>
    <linearGradient id="new_track" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#5A9ABE"/><stop offset="100%" stop-color="#2A6A90"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg2)"/>

  <!-- Floor -->
  <rect y="340" width="800" height="160" fill="#080F16"/>
  <rect y="338" width="800" height="4" fill="#1B8FD6" opacity="0.4"/>

  <!-- OLD DAMAGED TRACK (left half) -->
  <rect x="50" y="330" width="320" height="14" rx="3" fill="#2A3A48" stroke="#1A2A38" stroke-width="1"/>
  <!-- Dents and damage -->
  <path d="M90 330 Q100 325 110 330 Q115 326 120 330" fill="none" stroke="#0A1520" stroke-width="3"/>
  <path d="M160 330 Q168 322 175 330" fill="none" stroke="#0A1520" stroke-width="4"/>
  <path d="M230 330 Q240 326 248 330" fill="none" stroke="#0A1520" stroke-width="2.5"/>
  <!-- Corrosion patches -->
  <ellipse cx="130" cy="336" rx="18" ry="5" fill="#5A3A20" opacity="0.6"/>
  <ellipse cx="270" cy="334" rx="12" ry="4" fill="#5A3A20" opacity="0.5"/>
  <ellipse cx="195" cy="337" rx="8" ry="3" fill="#4A3018" opacity="0.7"/>
  <!-- Debris in track -->
  <circle cx="105" cy="337" r="3" fill="#2A2018"/>
  <circle cx="280" cy="336" r="2" fill="#2A2018"/>
  <text x="190" y="365" text-anchor="middle" font-family="Arial" font-size="13" fill="#FF6B6B" font-weight="700">DAMAGED TRACK</text>
  <text x="190" y="382" text-anchor="middle" font-family="Arial" font-size="11" fill="#FF9090">Bent · Corroded · Blocked drainage</text>

  <!-- Divider arrow -->
  <text x="400" y="340" text-anchor="middle" font-family="Arial" font-size="28" fill="#1B8FD6">→</text>

  <!-- NEW REPAIRED TRACK (right half) -->
  <rect x="430" y="330" width="320" height="14" rx="3" fill="url(#new_track)" stroke="#4A9ABE" stroke-width="1.5"/>
  <!-- Clean groove -->
  <rect x="430" y="334" width="320" height="6" rx="2" fill="#1A5A7A"/>
  <!-- Shine -->
  <rect x="432" y="331" width="316" height="2" rx="1" fill="rgba(255,255,255,0.2)"/>
  <text x="590" y="365" text-anchor="middle" font-family="Arial" font-size="13" fill="#4ADE80" font-weight="700">REPAIRED TRACK</text>
  <text x="590" y="382" text-anchor="middle" font-family="Arial" font-size="11" fill="#90E890">Straight · Clean · Drainage cleared</text>

  <!-- Door frame suggestion above -->
  <rect x="50" y="60" width="700" height="270" rx="4" fill="none" stroke="#1B4A6A" stroke-width="2" stroke-dasharray="8,5"/>
  <rect x="65" y="75" width="325" height="255" rx="2" fill="#1A3A52" opacity="0.5"/>
  <rect x="410" y="75" width="325" height="255" rx="2" fill="#1A4560" opacity="0.5"/>
  <rect x="390" y="60" width="20" height="270" fill="#1B5A80"/>

  <!-- Handles -->
  <rect x="678" y="170" width="8" height="40" rx="4" fill="#5A9ABE"/>

  <!-- Wave / water drainage illustration -->
  <path d="M50 320 Q150 310 250 320 Q350 330 430 318" fill="none" stroke="#1B8FD6" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <rect x="0" y="420" width="800" height="80" fill="rgba(0,0,0,0.75)"/>
  <text x="400" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="white">Track Repair & Replacement</text>
  <text x="400" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#90C8E8">Bent · Gouged · Corroded tracks fixed · Drainage channels cleared</text>
</svg>