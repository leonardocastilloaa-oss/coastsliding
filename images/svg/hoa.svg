<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0A1828"/><stop offset="100%" stop-color="#1A3050"/></linearGradient>
    <linearGradient id="building" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#2A4A68"/><stop offset="100%" stop-color="#1A3048"/></linearGradient>
    <linearGradient id="win6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#BCD8F0" stop-opacity="0.85"/><stop offset="100%" stop-color="#88C0E0" stop-opacity="0.65"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg6)"/>

  <!-- Sky gradient at top -->
  <rect width="800" height="200" fill="#1A4A78" opacity="0.3"/>

  <!-- Building facade -->
  <rect x="100" y="60" width="600" height="380" rx="4" fill="url(#building)"/>
  <!-- Building outline -->
  <rect x="100" y="60" width="600" height="380" rx="4" fill="none" stroke="#3A6A90" stroke-width="2"/>

  <!-- Floor lines -->
  <line x1="100" y1="155" x2="700" y2="155" stroke="#2A5A80" stroke-width="1.5"/>
  <line x1="100" y1="250" x2="700" y2="250" stroke="#2A5A80" stroke-width="1.5"/>
  <line x1="100" y1="345" x2="700" y2="345" stroke="#2A5A80" stroke-width="1.5"/>

  <!-- Windows grid — 4 columns x 4 rows -->
  <!-- Row 1 -->
  <rect x="130" y="80" width="100" height="65" rx="3" fill="url(#win6)"/><rect x="132" y="82" width="18" height="50" rx="3" fill="white" opacity="0.2"/>
  <rect x="250" y="80" width="100" height="65" rx="3" fill="url(#win6)"/><rect x="252" y="82" width="18" height="50" rx="3" fill="white" opacity="0.2"/>
  <rect x="370" y="80" width="100" height="65" rx="3" fill="url(#win6)" opacity="0.9"/><rect x="372" y="82" width="18" height="50" rx="3" fill="white" opacity="0.2"/>
  <rect x="490" y="80" width="100" height="65" rx="3" fill="url(#win6)"/><rect x="492" y="82" width="18" height="50" rx="3" fill="white" opacity="0.2"/>
  <!-- Row 1 lit window -->
  <rect x="610" y="80" width="75" height="65" rx="3" fill="#E8C840" opacity="0.6"/>
  <!-- Checkmark on one -->
  <circle cx="180" cy="112" r="14" fill="rgba(40,180,80,0.25)" stroke="#28B450" stroke-width="1.5"/>
  <path d="M172 112 L178 118 L190 106" stroke="#28B450" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Row 2 -->
  <rect x="130" y="175" width="100" height="65" rx="3" fill="url(#win6)"/><rect x="132" y="177" width="18" height="50" rx="3" fill="white" opacity="0.2"/>
  <!-- Broken window marker -->
  <rect x="250" y="175" width="100" height="65" rx="3" fill="url(#win6)" opacity="0.5"/>
  <path d="M270 190 L290 215 L285 230 L305 210" stroke="#1A2838" stroke-width="2.5" fill="none"/>
  <circle cx="290" cy="207" r="16" fill="rgba(220,50,50,0.2)" stroke="#DD3232" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="370" y="175" width="100" height="65" rx="3" fill="url(#win6)"/><rect x="372" y="177" width="18" height="50" rx="3" fill="white" opacity="0.2"/>
  <circle cx="420" cy="207" r="14" fill="rgba(40,180,80,0.25)" stroke="#28B450" stroke-width="1.5"/>
  <path d="M412 207 L418 213 L430 201" stroke="#28B450" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="490" y="175" width="100" height="65" rx="3" fill="url(#win6)"/>
  <rect x="610" y="175" width="75" height="65" rx="3" fill="url(#win6)" opacity="0.8"/>

  <!-- Row 3 -->
  <rect x="130" y="270" width="100" height="65" rx="3" fill="url(#win6)"/>
  <rect x="250" y="270" width="100" height="65" rx="3" fill="url(#win6)"/>
  <circle cx="300" cy="302" r="14" fill="rgba(40,180,80,0.25)" stroke="#28B450" stroke-width="1.5"/>
  <path d="M292 302 L298 308 L310 296" stroke="#28B450" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="370" y="270" width="100" height="65" rx="3" fill="url(#win6)" opacity="0.6"/>
  <rect x="490" y="270" width="100" height="65" rx="3" fill="url(#win6)"/>
  <rect x="610" y="270" width="75" height="65" rx="3" fill="url(#win6)" opacity="0.7"/>

  <!-- Row 4 / Ground floor sliding doors -->
  <rect x="130" y="360" width="120" height="65" rx="3" fill="url(#win6)"/>
  <rect x="130" y="360" width="120" height="65" rx="3" fill="none" stroke="#4A8AB0" stroke-width="1.5"/>
  <line x1="190" y1="360" x2="190" y2="425" stroke="#3A7A9A" stroke-width="2"/>
  <rect x="260" y="360" width="120" height="65" rx="3" fill="url(#win6)"/>
  <line x1="320" y1="360" x2="320" y2="425" stroke="#3A7A9A" stroke-width="2"/>
  <rect x="390" y="360" width="120" height="65" rx="3" fill="url(#win6)"/>
  <line x1="450" y1="360" x2="450" y2="425" stroke="#3A7A9A" stroke-width="2"/>
  <rect x="520" y="360" width="160" height="65" rx="3" fill="url(#win6)"/>
  <line x1="600" y1="360" x2="600" y2="425" stroke="#3A7A9A" stroke-width="2"/>

  <!-- Unit count badge -->
  <rect x="320" y="100" width="0" height="0" rx="10"/>

  <rect x="0" y="420" width="800" height="80" fill="rgba(6,14,24,0.92)"/>
  <text x="400" y="451" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="800" fill="white">HOA &amp; Commercial — Volume Repair Programs</text>
  <text x="400" y="476" text-anchor="middle" font-family="Arial, sans-serif" font-size="13.5" fill="#90C8E8">10+ units · Dedicated account manager · Scheduled maintenance · COI available</text>
</svg>