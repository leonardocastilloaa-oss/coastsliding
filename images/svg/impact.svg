<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0D2030"/><stop offset="100%" stop-color="#1A3A50"/></linearGradient>
    <linearGradient id="glass3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D0EAF8" stop-opacity="0.85"/><stop offset="100%" stop-color="#9ACCE8" stop-opacity="0.7"/></linearGradient>
    <linearGradient id="sky3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3A90C8"/><stop offset="100%" stop-color="#C8E8F8"/></linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg3)"/>

  <!-- Sky view through window -->
  <rect x="100" y="50" width="600" height="380" fill="url(#sky3)"/>
  <!-- Clouds -->
  <ellipse cx="240" cy="120" rx="60" ry="25" fill="white" opacity="0.7"/>
  <ellipse cx="270" cy="110" rx="45" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="560" cy="160" rx="70" ry="28" fill="white" opacity="0.6"/>
  <ellipse cx="590" cy="150" rx="50" ry="22" fill="white" opacity="0.7"/>
  <!-- Palm tree silhouette -->
  <rect x="480" y="280" width="8" height="150" fill="#2A5A30" opacity="0.6"/>
  <path d="M484 280 Q440 240 400 260 Q450 258 484 280 Z" fill="#3A7A40" opacity="0.7"/>
  <path d="M484 280 Q530 235 565 255 Q520 252 484 280 Z" fill="#3A7A40" opacity="0.7"/>
  <path d="M484 280 Q460 225 484 200 Q488 250 484 280 Z" fill="#4A9A50" opacity="0.7"/>

  <!-- Window frame -->
  <rect x="98" y="48" width="604" height="384" rx="6" fill="none" stroke="#2A6A90" stroke-width="6"/>
  <!-- Frame sides -->
  <rect x="98" y="48" width="16" height="384" rx="3" fill="#2A6A90"/>
  <rect x="686" y="48" width="16" height="384" rx="3" fill="#2A6A90"/>
  <rect x="98" y="48" width="604" height="14" rx="3" fill="#2A6A90"/>
  <rect x="98" y="418" width="604" height="14" rx="3" fill="#2A6A90"/>

  <!-- Impact glass laminate indication -->
  <rect x="114" y="62" width="572" height="370" fill="url(#glass3)" opacity="0.4"/>

  <!-- CRACK on left side (damaged) -->
  <path d="M 200 150 L 220 185 L 210 220 L 240 270 L 225 320" stroke="#1A2830" stroke-width="3" fill="none"/>
  <path d="M 220 185 L 195 200 L 210 220" stroke="#1A2830" stroke-width="2" fill="none"/>
  <path d="M 210 220 L 185 235" stroke="#1A2830" stroke-width="1.5" fill="none"/>
  <!-- Spider cracks -->
  <path d="M 205 165 L 190 155 M 215 175 L 205 160" stroke="#2A3840" stroke-width="1.2" fill="none"/>
  <!-- Red X warning -->
  <circle cx="220" cy="240" r="35" fill="rgba(220,50,50,0.2)" stroke="#DD3232" stroke-width="2" stroke-dasharray="5,3"/>
  <path d="M 205 225 L 235 255 M 235 225 L 205 255" stroke="#DD3232" stroke-width="3" stroke-linecap="round"/>
  <text x="220" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#FF6B6B" font-weight="700">VOID</text>

  <!-- RIGHT SIDE — new clean glass -->
  <rect x="400" y="62" width="282" height="370" fill="rgba(200,235,255,0.2)"/>
  <!-- Shine -->
  <rect x="415" y="70" width="15" height="200" rx="7" fill="white" opacity="0.3"/>
  <rect x="440" y="70" width="6" height="150" rx="3" fill="white" opacity="0.15"/>
  <!-- Green check -->
  <circle cx="580" cy="240" r="35" fill="rgba(40,180,80,0.2)" stroke="#28B450" stroke-width="2"/>
  <path d="M 562 240 L 574 252 L 598 228" stroke="#28B450" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="580" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#4ADE80" font-weight="700">NOA CERTIFIED</text>

  <!-- NOA badge -->
  <rect x="450" y="75" width="100" height="28" rx="5" fill="#1B8FD6"/>
  <text x="500" y="93" text-anchor="middle" font-family="Arial" font-size="11" fill="white" font-weight="800">HVHZ CERTIFIED</text>

  <rect x="0" y="420" width="800" height="80" fill="rgba(8,18,26,0.9)"/>
  <text x="400" y="453" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="white">Impact Glass Replacement — NOA Certified</text>
  <text x="400" y="477" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#90C8E8">Miami-Dade HVHZ compliant · Hurricane rated · Same-day parts available</text>
</svg>